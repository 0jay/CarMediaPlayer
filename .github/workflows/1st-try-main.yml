name: Build CarMediaPlayer APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Install required SDK components
    - name: Install SDK components
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"
        sdkmanager "platform-tools"

    # Install Gradle and generate the wrapper
    - name: Install Gradle and generate wrapper
      run: |
        # Install Gradle
        wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
        unzip gradle-8.7-bin.zip -d /opt/gradle
        export PATH=/opt/gradle/gradle-8.7/bin:$PATH
        
        # Generate the Gradle wrapper files
        gradle wrapper
        
        # Make the wrapper executable
        chmod +x gradlew

    # Now we have gradlew, so we can build
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CarMediaPlayer-debug
        path: app/build/outputs/apk/debug/*.apk
