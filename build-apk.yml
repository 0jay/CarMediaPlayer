name: Build CarMediaPlayer APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to manually trigger the workflow from GitHub UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Check out the code
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # 2. Set up Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # 3. Set up Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    # 4. Grant execute permission for gradlew
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    # 5. Build the APK (Debug version - no signing required)
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    # 6. Upload the APK as an artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CarMediaPlayer-debug
        path: app/build/outputs/apk/debug/*.apk
