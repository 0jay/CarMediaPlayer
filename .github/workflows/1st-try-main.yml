plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.saicmotor.media'
    compileSdk 34

    defaultConfig {
        applicationId "com.saicmotor.media"
        minSdk 27
        targetSdk 28
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    buildFeatures {
        viewBinding true
    }

    // Signing configuration (commented out for now)
    // To enable signing, uncomment the following sections
    // and place your keystore in app/keys/
    //
//     signingConfigs {
//         platform {
//             storeFile     file("keys/platform.keystore")
//             storePassword "android"
//             keyAlias      "platform"
//             keyPassword   "android"
//         }
//     }
//     buildTypes {
//         release { signingConfig signingConfigs.platform }
//         debug   { signingConfig signingConfigs.platform }
//     }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.9.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.8.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.media:media:1.6.0'
    implementation 'androidx.localbroadcastmanager:localbroadcastmanager:1.1.0'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
